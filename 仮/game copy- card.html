<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>battle</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&family=Yuji+Mai&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Grenze:ital,wght@0,100..900;1,100..900&family=Manufacturing+Consent&family=Yuji+Mai&display=swap" rel="stylesheet">


  <style>

:root {
  --main-bg: rgb(12, 9, 1);
  --main-text: rgb(231, 183, 78);
  --sub-text: rgb(78, 64, 18);
  --main-font: "Grenze", "Yuji Mai", sans-serif;

  
}
::-webkit-scrollbar{
  display:none;
}
.fir { color: #b6200c; }
.ice { color: #108891; }
.ltn { color: #b624c4; }
.acd { color: #588505; }
body{
  font-family: var(--main-font);
  font-size: 20px;
  background-color: var(--main-bg);
  color: var(--main-text);
  line-height: 1.2;
}
button {
  background-color: var(--main-bg);
  color: var(--main-text);
  border: none;
  box-shadow: 2px 2px 0 var(--main-text);
  font-family:  var(--main-font);
  font-size: 20px;
  cursor: pointer;
}
button:active {
  transform: translate(2px, 2px);
  box-shadow: -2px -2px 0 var(--main-text);
}
button.pressed {
  transform: translate(2px, 2px);
  box-shadow: -2px -2px 0 var(--main-text);
  opacity: 0.5;
  pointer-events: none;
}
#center-area {
  position: relative;
  width: 100%;
  height: 100vh;

  justify-content: center;
  align-items: center;
  display: flex;
}

#tooltip{
  position: fixed;
  display: none;
  background: var(--main-bg);
  color: var(--main-text);
  padding: 8px;
  box-shadow: 2px 2px 0 var(--main-text);
  font-size: 20px;
  white-space: pre-line;
  pointer-events: none;
  z-index: 999;
}

#log{
  z-index: 3;
  padding: 5px;
  border-left: 2px solid var(--sub-text);
  position:fixed;
  left: 50px;
  top: 60px;
  bottom: 70%;
  width: 20%;
  overflow-y: scroll; 
  white-space: pre-line;
}

#characterStatus{
  z-index: 3;
  padding: 10px;
  border-left: 2px solid var(--sub-text);
  position:fixed;
  right: 0px;
  top: 30px;
  bottom: 62%;
  width: 22%;
  overflow-y: auto; 
  white-space: pre-line;
}
#playerStatus{
  font-family: "Manufacturing Consent", "Yuji Mai";
  position: fixed;
  text-align: left;
  bottom: 50px;
  width:100%; 
  height:100px; 
  display:flex;
}
#playerHPBarBorder{
  position:relative; 
  top: 80%; 
  width: 100%; 
  height: 10px; 
  border: 1px solid var(--main-text);
}
#playerBlockValue{
  position: absolute; 
  top: 50%; 
  left: 50%;
  translate: -50% -50%;
  font-size: 30px;
  color:var(--main-text);
  -webkit-text-stroke: 10px var(--main-bg);
  paint-order: stroke;
}
.guard::before,
.guard::after{
  content: "";
  position: absolute;
  inset: -10px;
  pointer-events: none;
}
.guard::before{
  background:
    linear-gradient(var(--main-text),var(--main-text)) left top / 20% 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) left top / 2px 15px no-repeat,
    
    linear-gradient(var(--main-text),var(--main-text)) right top / 20% 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) right top / 2px 15px no-repeat;
}
.guard::after{
  background:
    linear-gradient(var(--main-text),var(--main-text)) left bottom / 20% 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) left bottom / 2px 15px no-repeat,
    
    linear-gradient(var(--main-text),var(--main-text)) right bottom / 20% 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) right bottom / 2px 15px no-repeat;
}
#enemyArea{
  font-family: "Manufacturing Consent", "Yuji Mai";
  position: fixed;
  display: flex;
  flex-wrap: nowrap;
  top: 30px;
  left: 50%;
  width: 50%;
  height: fit-content;
  transform: translateX(-50%);
  text-align: center;
  justify-content: center;
}
.enemyStatus{
  flex: 1;
  width: auto;
  min-width: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px;
  gap: 10px 0px;
}
.enemyName{
  position: relative;
  font-size: 30px;
  width: fit-content;
  padding:10px 40px;
}
.enemyName.targeted::before,
.enemyName.targeted::after{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.enemyName.targeted::before{
  background:
    linear-gradient(var(--main-text),var(--main-text)) left top / 12px 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) left top / 2px 12px no-repeat,
    
    linear-gradient(var(--main-text),var(--main-text)) right top / 12px 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) right top / 2px 12px no-repeat;
}
.enemyName.targeted::after{
  background:
    linear-gradient(var(--main-text),var(--main-text)) left bottom / 12px 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) left bottom / 2px 12px no-repeat,
    
    linear-gradient(var(--main-text),var(--main-text)) right bottom / 12px 2px no-repeat,
    linear-gradient(var(--main-text),var(--main-text)) right bottom / 2px 12px no-repeat;
}

.enemyHPBarBorder{
  width: 100%; 
  height: 10px; 
  flex-shrink: 0;
  border: 1px solid var(--main-text);
}
.enemyHPBar{
  height: 100%; 
  width: 100%; 
  background: var(--main-text);
}
.enemyState{ 
  top: 90px; 
  width:100%; 
  height: fit-content;
  display: flex; 
  flex-wrap: wrap; 
  gap:2px 15px; 
  overflow-y: auto;
}
.battleUI{
  display: none;
}
.itemUI{
  height: 30px; 
  width: fit-content;
  font-family: "Manufacturing Consent", "Yuji Mai";
  font-size: 30px;
  display: flex;
  padding: 5px;
  line-height: 1;
  border-bottom:2px solid var(--sub-text);
}
.directionButton{
  position:absolute;
  text-align: center;
  color: var(--sub-text);
  box-shadow: none;
  translate: -50% -50%;
  height:50px;
  width: 50px;
}
.directionButton.mouseOver{
  color: var(--main-text);
}
.directionButton:active{
  box-shadow: none;
  transform: translate(0, 2px);
}
.direction{
  position:absolute;
  text-align: center;
  align-content: center;
  font-size: 30px;
  translate: -50% -50%;
  height:50px;
  width: 50px;
}
#rewardBox{
  position: absolute; 
  height: 50px; 
  width: 100px;
  line-height: 1.2;
  z-index: 1;
}
.reward{
  position: absolute;
  background-color: var(--main-bg);
  box-shadow: -2px -2px 0 var(--main-text);
  top: 50%; 
  left: 50%;
  translate: -50% -50%; 
  height: 300px;
  width: 400px;
  overflow-y: scroll;
  flex-wrap: wrap;
  align-content: flex-start;
  z-index: 20;
  padding: 40px;
  row-gap: 15px;
}
#reward::-webkit-scrollbar{
  display:none;
}
.rewardItem{
  font-family: "Manufacturing Consent", "Yuji Mai";
  width: 100%;
  height: 50px;
}
.coinButton{
  border-radius: 50px;
}
.buttonWrap{
  filter: drop-shadow(2px 2px 0 var(--main-text));
}
.buttonWrap:active{
  filter: drop-shadow(-2px -2px 0 var(--main-text));
}

.weaponButton{
  font-family: "Manufacturing Consent", "Yuji Mai";
  height: 100%;
  width: 100%;
  clip-path: polygon(
    4% 0%,
    96% 0%,
    100% 50%,
    96% 100%,
    4% 100%,
    0% 50%
  );
}
.armorButton{
  font-family: "Manufacturing Consent", "Yuji Mai";
  height: 100%;
  width: 100%;
  clip-path: polygon(
    3% 0%,
    97% 0%,
    100% 20%,
    100% 80%,
    97% 100%,
    3% 100%,
    0% 80%,
    0% 20%
  );
}
.skillButton{
  font-family: "Manufacturing Consent", "Yuji Mai";
  height: 100%;
  width: 100%;
  clip-path: polygon(
    0% 0%,
    100% 0%,
    100% 100%,
    0% 100%
  );
}
.mapButton{
  font-family: "Manufacturing Consent", "Yuji Mai";
  height: 100%;
  width: 100%;
  clip-path: polygon(
    0% 0%,
    100% 0%,
    96% 50%,
    100% 100%,
    0% 100%,
    4% 50%
  );
}
.glow{
  animation: flash 3s infinite;
}

@keyframes flash {
  0%, 100% {
    text-shadow: 0 0 20px currentColor;
  }
  50% {
    text-shadow: 0 0 15px currentColor;
  }
}
#NPC{
  position: absolute; 
  height: 50px; 
  width: 200px;
  z-index: 1;
}
.spkUI{
  position: absolute;
  background-color: var(--main-bg);
  box-shadow: -2px -2px 0 var(--main-text);
  top: 50%; 
  left: 50%;
  translate: -50% -50%; 
  height: 300px;
  width: 500px;
  padding: 50px;
  gap: 30px 30px;
  z-index: 10;
}
.glyphOnSale{
  position: relative;
  width:30%;
  padding: 30px;
  background: var(--main-bg);
  border-radius:10px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.glyphOnSaleTop{
  position:absolute;
  top: 20px;
  font-size:20px;
}
.glyphOnSaleCenter{
  position:absolute;
  top: 40%;
  font-size:25px;
}
.glyphOnSaleBottom{
  position:absolute;
  bottom: 30px;
  font-size:20px;
}
.glyphOnSale.mouseOver{
  animation:mouseOver 0.1s ease-in forwards;
}
.glyphOnSale.sold{
  pointer-events: none;
  transform: translate(2px, 2px);
  box-shadow: -2px -2px 0 var(--main-text);
  opacity: 0.7;
}

.closeButton{
  position: absolute; 
  top:5px; 
  right:5px; 
  width:30px; 
  height:30px;
}

#board{
  z-index: 5;
  position: fixed;
  bottom: 200px;
  width:100%; 
  height:100px; 
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events: none;
  gap: 15px;
}

.card{
  position: relative;
  width:120px;
  height:180px;
  background: var(--main-bg);
  border:2px solid var(--sub-text);
  border-radius:10px;
  color: var(--main-text);
  text-align: center;
  justify-content: center;
  font-family: "Manufacturing Consent", "Yuji Mai";
  font-size:30px;
}
.cardName{
  position: absolute;
  left: 50%;
  translate: -50% 0;
  width: 80%;
  height: 30%;
  top: 10%;
  color: var(--main-text);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
}
.cardDescription{
  position: absolute;
  left: 50%;
  translate: -50% 0;
  width: 80%;
  height: 40%;
  bottom: 10%;
  color: var(--sub-text);
  text-align: center;
  font-size: 20px;
}
.cardCost{
  position: absolute;
  left: 10px;
  translate: -50% -50%;
  width: 35px;
  height: 35px;
  top: 10px;
  background-color: var(--main-bg);
  border: 2px solid var(--sub-text);
  border-radius: 50%;
  color: var(--main-text);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
}
.cardCost.active{
  border-color: (var(--main-text));
  box-shadow: 0 0 3px currentColor;
}
.card.active{
  border:2px solid var(--main-text);
  box-shadow: 0 0 2px currentColor;
}
.card.draw{
  opacity:0;
  transform:translateX(-600px);
  animation:draw 0.2s ease-out forwards;
}
.card.play{
  z-index: 6;
  text-shadow: 0 0 30px currentColor;
  box-shadow: 0 0 5px currentColor;
  animation:play 0.2s ease-in-out forwards;
}
.card.dispose{
  opacity:1;
  animation:dispose 0.2s ease-in forwards;
}
.card.fly{
  opacity:1;
  animation:fly 0.2s ease-out forwards;
}
.card.mouseOver{
  animation:mouseOver 0.1s ease-in forwards;
}

@keyframes draw{
  to{
    opacity:1;
    transform:translateX(0);
  }
}
@keyframes mouseOver{
  to{
    transform: translateY(-10px) scale(1);
  }
}
@keyframes play{
  to{
    transform: translateY(-40px) scale(1.2);
  }
}
@keyframes dispose{
  0%{
    transform: translateY(-40px) scale(1.2);
  }
  100%{
    opacity: 0;
    transform: translateX(600px) scale(0.3);
  }
}

@keyframes fly{
  0%{
    transform: translateY(-40px) scale(1.2);
  }
  100%{
    opacity: 0;
    transform: translateY(-200px) scale(0.3);
  }
}

.shake{
  animation: screenShake 0.1s ease;
}

@keyframes screenShake{
  0%   { transform: translate(5px,3px); }
  10%  { transform: translate(-3px, 5px); }
  40%  { transform: translate(2px, 1px); }
  70%  { transform: translate(-1px, -2px); }
  100% { transform: translate(0,0); }
}

.statusInfo{
  width: fit-content;
  height: fit-content;
  font-size: 20px;
}

#drawPile{
  position: absolute;
  left: 5%;
  width:120px;
  height:180px;
  background-color: var(--main-bg);
  border:2px solid var(--sub-text);
  box-shadow: 5px 5px 0 var(--sub-text);
  border-radius:10px;
  color: var(--main-text);
  text-align: center;
  justify-content: center;
  font-size:30px;
  pointer-events: auto;
}
#cardsUI{
  z-index:200;
  position: absolute;
  left: 50%;
  top: 50%;
  translate: -50% -50%;
  width:80%;
  height:80%;
  padding: 30px;
  background: var(--main-bg);
  border:2px solid var(--sub-text);
  border-radius:10px;
  display: none;
  flex-wrap: wrap;
  gap: 30px 30px;
  overflow-y: auto;
  align-content:flex-start;
}
#state{
  position:absolute; 
  top: 90px; 
  width:100%; 
  height: 50px; 
  display: flex; 
  flex-wrap: wrap; 
  gap:2px 15px; 
  overflow-y: auto;
}

.portal{
  position: absolute; 
  display: flex;
  height: 100px; 
  width: 100px;
  background-color: var(--main-bg);
  border: 2px solid var(--main-text);
  border-radius: 50px;
  box-shadow: 0 0 20px currentColor;
  justify-content: center;
  align-items: center;
  z-index: 1;
}
#fadeScreen{
  position: fixed;
  display: flex;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.6s;
  font-family: "Manufacturing Consent", "Yuji Mai";
  font-size: 50px;
  justify-content: center;
  align-items: center;
}
#bigText{
  position: fixed;
  display: flex;
  right:-20px;
  left: -20px;
  bottom: 45%;
  top: 45%;
  background: var(--main-bg);
  border: 2px solid var(--main-text);
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
  transition: opacity 0.6s;
  font-family: "Manufacturing Consent", "Yuji Mai";
  font-size: 50px;
  justify-content: center;
  align-items: center;
}

#positionUI{
  position:fixed; 
  top: 20px; 
  left: 50%;
  translate: -50% 0;
  display: flex;
  flex-direction: column;
  height: 100px;
  width: fit-content;
  overflow-y: auto;
  text-align: center;
}

#areaName{
  position:fixed; 
  top: 20px; 
  left: 50px;
  height: 100px;
  width: 10%;
  font-size: 30px;
}


</style>
</head>
<body>



<div id="center-area">
  <div id="fadeScreen"></div>
  <div id="bigText"></div>
  <div id="enemyArea">
  </div>


  <button id="rewardBox" onclick="showReward();" style="display:none;">Reward
  </button>


  <button id="NPC" onclick="speakNPC();" style="display:none;">
  </button>


  <div id="choices">
    <div class="direction" onclick="goStraight()" style="top:25%; left: 50%;"></div>
    <div class="direction" onclick="goLeft()" style="top:50%; left: 20%;"></div>
    <div class="direction" onclick="goRight()" style="top:50%; left: 80%;"></div>
    <div class="direction" onclick="goDown()" style="top:75%; left: 50%;"></div>
    <button class="directionButton" onclick="goStraight()" onmouseover="buttonMouseOver(this)" onmouseout="buttonMouseOut(this)" style="top:35%; left: 50%;">North</button>
    <button class="directionButton" onclick="goLeft()" onmouseover="buttonMouseOver(this)" onmouseout="buttonMouseOut(this)" style="top:50%; left: 30%;">West</button>
    <button class="directionButton" onclick="goRight()" onmouseover="buttonMouseOver(this)" onmouseout="buttonMouseOut(this)" style="top:50%; left: 70%;">East</button>
    <button class="directionButton" onclick="goDown()" onmouseover="buttonMouseOver(this)" onmouseout="buttonMouseOut(this)" style="top:65%; left: 50%;">South</button>
  </div>

  <div id="playerStatus">
  <div style="position:absolute; left:7%; width:25%; height: 100%;">
    <p id = "playerInfo" style="position:absolute; top:7%; font-size: 30px;"></p>

    <div id="playerHPBarBorder">

  <button id="endTurnButton" class="battleUI" onclick="turnEnd();" style="position:absolute; left:50%; bottom:0px; height:50px; width:20%; translate: -50% 0">End Turn</button>
  </div>
  
  <div id="board">
        <button id="drawPile" onclick="showDrawPile()"></button>
    </div>
  <div id="cardsUI">
    <button class="closeButton" onclick="closeDrawPile()">×</button>
  </div>

  
</div>

<div id="tooltip"></div>
<div id="areaName"></div>
<div id="positionUI">
  <div id="position" style="font-size: 30px;"></div>
</div>


<div id="log"></div>
<div id="characterStatus"></div>

function update() {

  document.getElementById("playerInfo").innerText =
    `${playerHP} / ${finalStats.HP}`;  
  document.getElementById("playerInfo2").innerText =
    `Coin: ${coin}`;

  if(playerHP > finalStats.HP){
    playerHP = finalStats.HP;
  }
  let percent1 = (playerHP / finalStats.HP) * 100;
  document.getElementById("playerHPBar").style.width = percent1 + "%";
  let block = cArmor.DEF;

  document.getElementById("actionPoint").innerText =
    "▮".repeat(playerAP) + "▯".repeat(finalStats.AP - playerAP);

    if(playerAP == 0){
      document.getElementById("endTurnButton").classList.add("glow");
    }
    else{
      document.getElementById("endTurnButton").classList.remove("glow");
    }
    
  
  if(gainedBlock > 0){
    if(isCombat) document.getElementById("playerBlockValue").innerText =`${gainedBlock}`;
    document.getElementById("playerHPBarBorder").classList.add("guard");
  }
  else {
    if(isCombat) document.getElementById("playerBlockValue").innerText =``;
    document.getElementById("playerHPBarBorder").classList.remove("guard");
  }
    
  const state = document.getElementById("state");
  state.innerHTML = "";
  for(let buff of buffs){
    const buffUI = document.createElement("div");
    buffUI.textContent = `${buff.name}: ${buff.TRN}`;
    buffUI.classList.add("statusInfo");
    state.appendChild(buffUI);
    buffUI.addEventListener("mouseover", function(event){
      showTooltip(
        `${buff.name}
        ${buff.description}`,
        event
      );
    })
    buffUI.addEventListener("mousemove", function(event){
      moveTooltip(event);
    })
    buffUI.addEventListener("mouseout", function(){
      hideTooltip();
    })
  }
  for(let debuff of debuffs){
    const debuffUI = document.createElement("div");
    debuffUI.textContent = `${debuff.name}: ${debuff.TRN}`;
    debuffUI.classList.add("statusInfo");
    state.appendChild(debuffUI);
    debuffUI.addEventListener("mouseover", function(event){
      showTooltip(
        `${debuff.name}
        ${debuff.description}`,
        event
      );
    })
    debuffUI.addEventListener("mousemove", function(event){
      moveTooltip(event);
    })
    debuffUI.addEventListener("mouseout", function(){
      hideTooltip();
    })
  }
  if(cEnemy.content)
  for(let i = 0; i < cEnemy.content.length; i++){
    const enemy = cEnemy.content[i];

    document.getElementsByClassName("enemyInfo")[i].innerHTML = `${enemy.cHP} / ${enemy.block}`;
    if(activeEnemy === enemy){
      document.getElementsByClassName("enemyName")[i].classList.add("targeted");
    }
    else{
      document.getElementsByClassName("enemyName")[i].classList.remove("targeted");
    }
    let percent2 = (enemy.cHP / enemy.HP) * 100;
    document.getElementsByClassName("enemyHPBar")[i].style.width = percent2 + "%";

function showTooltip(text, event) {
  const tip = document.getElementById("tooltip");

  tip.innerHTML = text;
  tip.style.display = "block";
  let left = event.clientX;
  let top  = event.clientY;

  requestAnimationFrame(() => {
    let left = event.clientX;
    let top = event.clientY;
    const margin = 10;
    const w = tip.offsetWidth;
    const h = tip.offsetHeight;
    if (top + h > window.innerHeight - margin) {
      top = window.innerHeight - h - margin;
    }
    if (left + w > window.innerWidth - margin) {
      left = window.innerWidth - w - margin;
    }
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  });
}
function moveTooltip(event){
  const tip = document.getElementById("tooltip");
  let left = event.clientX;
  let top  = event.clientY;

  requestAnimationFrame(() => {
    let left = event.clientX;
    let top = event.clientY;
    const margin = 10;
    const w = tip.offsetWidth;
    const h = tip.offsetHeight;
    if (top + h > window.innerHeight - margin) {
      top = window.innerHeight - h - margin;
    }
    if (left + w > window.innerWidth - margin) {
      left = window.innerWidth - w - margin;
    }
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  });
}
function hideTooltip(){
  document.getElementById("tooltip").style.display = "none";
}

function getStats(key){
  return stats[key] || 0;
}
function getEnemyStats(enemy, key){
  return enemy.stats[key] || 0;
}
function calcDamage(ATK){
  let damage = 0;
  let sum_con = getStats("conFIR") + getStats("conICE") + getStats("conLTN") + getStats("conACD");
  if(sum_con < 100){
    sum_con = 100;
  }
  FIR_flat = ATK * (getStats("conFIR") / sum_con);
  ICE_flat = ATK * (getStats("conICE") / sum_con);
  LTN_flat = ATK * (getStats("conLTN") / sum_con);
  ACD_flat = ATK * (getStats("conACD") / sum_con);
  PSC_flat = ATK - (FIR_flat + ICE_flat + LTN_flat + ACD_flat);

  magPSC = 100 + getStats("magPSC");
  magFIR = 100 + getStats("magFIR");
  magICE = 100 + getStats("magICE");
  magLTN = 100 + getStats("magLTN");
  magACD = 100 + getStats("magACD");

  PSC = Math.floor(PSC_flat * magPSC / 100)
  FIR = Math.floor(FIR_flat * magFIR / 100)
  ICE = Math.floor(ICE_flat * magICE / 100)
  LTN = Math.floor(LTN_flat * magLTN / 100)
  ACD = Math.floor(ACD_flat * magACD / 100)
  damage = PSC + FIR + ICE + LTN + ACD;

  return (damage);
}

function normalDistribution(accuracy){
	var x = Math.random();
	var y = Math.random();
	
	var z1 = 1 + Math.sqrt(-2*Math.log(x))*Math.cos(2 * Math.PI  * y)* accuracy/100;

	return z1;
}

function useSkill(card) {
  if (playerAP < usedSkill.AP) {
    log("Not enough AP");
    play(errorSound);
    return;
  }
  playerAP -= usedSkill.AP;
  checkCardCost()

  card.style.pointerEvents = "none";
  const center = document.getElementById("center-area");
  card.style.animationDelay = `0s`;
  card.classList.add("play");

  for(let effect of usedSkill.effects){
    const type = effect.type;
    setTimeout(() => {
    if(!isCombat) return;
    switch(type){
      case("attack"):
        attack(effect, card)
      break;
      case("block"):
        block(effect, card);
      break;
      case("buff"):
        buff(effect, card);
      break;
      case("debuff"):
        debuff(effect, card);
      break;
      case("draw"):
        draw(effect, card);
      break;

    }
    card.classList.remove("play");
    card.classList.add("dispose");
    }, 400);
  }
    
}

function enemyTurn(enemy) {
  if (enemy.cHP <= 0) return;

  enemy.stats = mergeMods(...debuffs.map(buff => buff.mods));

  debuffs.forEach(debuff => debuff.TRN --);
  debuffs = debuffs.filter(debuff => debuff.TRN > 0);

  let stun = false;
  for (let debuff of enemy.status){
    if(debuff.type === "stun"){
      stun = true;
    }
  }

  if(!stun){
    const acts = enemy.pattern[enemy.step];

    acts.forEach(act=>{
      actions[act.type](enemy, act, false);
    });

    enemy.step++;
    if(enemy.step >= enemy.pattern.length){
      enemy.step = 0;
    }
  }
  update();
  characterUpdate();

}

function enemyTurnEnd(enemy){
  for (let debuff of enemy.status){
    if(debuff.type === "damage"){
      let damage = debuff.value;
      if(enemy.block >= damage){
      enemy.block -= damage;
      }
      else{
      enemy.cHP -= (damage - enemy.block);
      enemy.block = 0;
      }
    }
  }
  enemy.status.forEach(buff => buff.TRN --);
  enemy.status = enemy.status.filter(buff => buff.TRN > 0);
  checkGame();
}
const actions = {
  Attack(enemy, data, set){
    if(set){
    data.value = Math.floor(normalDistribution(data.sd) * (enemy.finalStats.ATK * data.rate));
    }
    else{
      enemyAttack(enemy, data.value);
      play(attackSound);
    }
  },
  Block(enemy, data, set){
    if(set){
      data.value =  Math.floor(normalDistribution(data.sd) * (enemy.finalStats.DEF * data.rate));
    }
    else{
      enemyGuard(enemy, data.value);
      play(blockSound);
    }
  },
  DamageDebuff(enemy, data, set){
    if(set){
      //data.value =  Math.floor(normalDistribution(data.sd) * (enemy.finalStats.ATK * data.rate));
    }
    else{
      enemyDamageDebuff(enemy, data);
      play(debuffSound);
    }
  },
  None(enemy, data, set){}
};

function enemyAttack(enemy, value){
  shake();
  if(gainedBlock >= value){
  gainedBlock -= value;
  log(enemy.name + " dealt 0 damage");
  }
  else{
  playerHP -= (value - gainedBlock);
  log(enemy.name + " dealt "+ (value - gainedBlock) + " damage");
  gainedBlock = 0;

}
function enemyGuard(enemy, value){

function random(List, tier){
  const filteredList = tier? List.filter(e => (e.Tier >= tier - 1 && e.Tier <= tier + 1)) : List;
  let totalWeight = 0;
  filteredList.forEach(e => totalWeight += e.PROB);
  let r = Math.floor(Math.random() * totalWeight);
  for (let i = 0; i < List.length; i++) {
    if (r < filteredList[i].PROB) {
      const s = { ...filteredList[i] };
      return(s)
      break;
    }
    r -= filteredList[i].PROB;
  }
}

function mergeMods(...sources){
  const result = {};

  sources.forEach(obj => {
    for(const key in obj){
      result[key] = (result[key] || 0) + obj[key];
    }
  });

  return result;
}

function randomMap(rew){
  let totalWeight = 0;

   for (let i = 0; i < randomEvents.length; i++) {

      if(!randomEvents[i].isMap){

        dropMap(rew, map);

      break;
    }
    r -= randomEvents[i].mapPROB;
  }

}

  const button = document.createElement("button");
  let glyph;
  let totalWeight = 0;
  glyphs.forEach(glyph => totalWeight += glyph.PROB);
  let r = Math.floor(Math.random() * totalWeight);
   for (let i = 0; i < glyphs.length; i++) {
    if (r < glyphs[i].PROB) {
      glyph = { ...glyphs[i] };
      break;
    }
    r -= glyphs[i].PROB;
  }
  button.classList.add("glyphOnSale");
  button.innerHTML = 
  `<div class="glyphOnSaleTop">Enchant your weapon</div>
  <div class="glyphOnSaleCenter">${glyph.name}<br>[ ${glyph.read} ] </div>
  <div class="glyphOnSaleBottom">Coin: ${glyph.CST}</div>`;

  button.addEventListener("click", function () {
  if(coin >= glyph.CST){
    if(!cWeapon.some(_glyph => _glyph.name === glyph.name)){
      if((cWeapon.length - 1) < cWeapon[0].SLT){
      cWeapon.push(glyph);
      enchant(glyph);
      button.classList.add("sold");
      }
      else{
        log("You cannot enchant any more");
      }
    }
    else{
      log("You cannot enchant same Glyph");
    }
  }
  else{
    log("Not enough coin");
  }
  });
  button.addEventListener("mouseover", function (event) {
    button.classList.add("mouseOver");
  document.getElementsByClassName("itemUI")[0].innerHTML += `<div class="glow"> ${glyph.name} </div>`;
  showTooltip(
      glyph.description,
      event
    );
  });
  button.addEventListener("mousemove", function (event){
    moveTooltip(event);
  });
  button.addEventListener("mouseout", function (event){
    button.classList.remove("mouseOver");
    hideTooltip();
    const weaponUI = document.getElementsByClassName("itemUI")[0];
    weaponUI.textContent = ""
    cWeapon.forEach(e => {weaponUI.innerHTML += `${e.name}&nbsp;`});
    
  })
  spk.appendChild(button);
  }
  }
}
function showNPC(){
  const NPC = document.getElementById("NPC");
  NPC.style.display = "block";
}
function speakNPC(){
  speakingNPC.style.display = "flex";
}
function closeSpkUI(spk){
  spk.style.display = "none";
  hideTooltip();
}
function collectCoins(n,btn){
  coin += n;
  btn.remove();
  log(`You got ${n} coin`);
  update();
}

function enchant(glyph){
  coin -= glyph.CST;

  weaponUpdate();
  characterUpdate();
  update();
}

function buttonMouseOver(btn){
  btn.classList.add("mouseOver");
}
function buttonMouseOut(btn){
  btn.classList.remove("mouseOver");
}

function shake(){
  const center = document.getElementById("center-area");
  center.classList.add("shake");
  center.addEventListener("animationend", function(a){
    if(a.animationName === "screenShake"){
    center.classList.remove("shake");
    }
  })
}
function reset() {
  playerHP = maxHP;
  playerAP = maxAP;
  update();
}

function showPortal(){
  const center = document.getElementById("center-area");
  const portal = document.createElement("div");
  portal.innerText = "Portal";
  portal.className = "portal eventUI";
  portal.addEventListener("click", function(){
    shiftArea();
    portal.remove();
  })
  center.appendChild(portal);
}
async function shiftArea(){

  const fade = document.getElementById("fadeScreen");
  fade.style.opacity = "1";
  setTimeout(() => {
    fade.style.opacity = "0";
  }, 1000);
  await wait(600);

  area = {...areas[area.id]};
  
  areaSetting();
  bigText(area.name, 1500);
  move();
}

function bigText(text, dur){
  const bigText = document.getElementById("bigText");
  bigText.textContent = text;
  bigText.style.opacity = "1";
  setTimeout(() => {
    bigText.style.opacity = "0";
  }, dur);
}
